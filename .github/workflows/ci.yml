name: CI

# Gate PRs into dev/main. Runs typecheck + lint for both packages so a broken
# change can't merge.
on:
  pull_request:
    branches: [dev, main]
  push:
    branches: [dev, main]

jobs:
  api:
    name: API (typecheck + lint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      # npm install (not ci): the workspace lockfile lives at the repo root, so
      # api/package-lock.json drifts and `npm ci` would reject it.
      - run: npm install --no-audit --no-fund
      # Generate the Prisma client FIRST — typecheck needs @prisma/client types.
      - run: npx prisma generate
      - run: npx tsc --noEmit
      - run: npx eslint "src/**/*.ts"

  mobile:
    name: Mobile (typecheck + lint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --no-audit --no-fund
      - run: npx tsc --noEmit
      - run: npx eslint .
